name: Cleanup — удалить лиды без контактов

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete no-contact parser leads
        env:
          BITRIX24_WEBHOOK_URL: ${{ secrets.BITRIX24_WEBHOOK_URL }}
          CI: "true"
        run: python3 scripts/delete_no_contact_leads.py
